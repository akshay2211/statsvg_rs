name: Render and publish stats SVG

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  STATSVG_USER: akshay2211
  STATSVG_THEME: github_dark
  STATSVG_WIDTH: '680'
  STATSVG_HIGHLIGHT: ''   # e.g. "Currently building stats.example.com"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Render profile variant
        env:
          GH_TOKEN: ${{ secrets.STATS_GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          ARGS=(render
            --user "$STATSVG_USER"
            --theme "$STATSVG_THEME"
            --variant profile
            --width "$STATSVG_WIDTH"
          )
          if [ -n "$STATSVG_HIGHLIGHT" ]; then
            ARGS+=(--highlight "$STATSVG_HIGHLIGHT")
          fi
          ./target/release/statsvg-rs "${ARGS[@]}" > dist/profile.svg

      - name: Render stats variant
        env:
          GH_TOKEN: ${{ secrets.STATS_GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ARGS=(render
            --user "$STATSVG_USER"
            --theme "$STATSVG_THEME"
            --variant stats
            --width "$STATSVG_WIDTH"
          )
          if [ -n "$STATSVG_HIGHLIGHT" ]; then
            ARGS+=(--highlight "$STATSVG_HIGHLIGHT")
          fi
          ./target/release/statsvg-rs "${ARGS[@]}" > dist/stats.svg

      - name: Build landing page
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          cat > dist/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>statsvg-rs — GitHub stats SVG</title>
            <style>
              body { font-family: -apple-system, system-ui, sans-serif; background: #0d1117; color: #c9d1d9; padding: 2rem; max-width: 820px; margin: 0 auto; line-height: 1.5; }
              a { color: #58a6ff; }
              img { max-width: 100%; height: auto; display: block; margin: 1rem 0; border-radius: 16px; }
              code, pre { background: #161b22; padding: 2px 8px; border-radius: 6px; font-size: 0.9em; }
              pre { padding: 12px; overflow-x: auto; }
              h1 { margin-bottom: 0.25rem; }
              h2 { margin-top: 2.5rem; }
              .meta { color: #7d8590; font-size: 0.9em; }
            </style>
          </head>
          <body>
            <h1>statsvg-rs</h1>
            <p class="meta">GitHub stats cards rendered in Rust, re-generated every 6 hours via GitHub Actions, published as static SVGs to GitHub Pages.</p>

            <h2>Profile variant</h2>
            <p class="meta">For embedding in your <strong>repo READMEs</strong> — header-heavy, includes avatar, bio, pinned repos.</p>
            <img src="profile.svg" alt="Profile card for ${STATSVG_USER}">
            <pre><code>![Stats](https://${OWNER}.github.io/${REPO_NAME}/profile.svg)</code></pre>

            <h2>Stats variant (anti-profile)</h2>
            <p class="meta">For embedding in your <strong>profile README</strong> — skips identity duplicates, shows lifetime totals, contributed-to repos, your most-starred project.</p>
            <img src="stats.svg" alt="Lifetime stats for ${STATSVG_USER}">
            <pre><code>![Lifetime stats](https://${OWNER}.github.io/${REPO_NAME}/stats.svg)</code></pre>

            <h2>Fork it for yourself</h2>
            <p>Fork the repo, change <code>STATSVG_USER</code> in <code>.github/workflows/render.yml</code>, enable GitHub Pages (Settings → Pages → Source: <em>GitHub Actions</em>). Your cards publish to your own <code>&lt;you&gt;.github.io/${REPO_NAME}/</code>.</p>
            <p>For private repo data, generate a classic PAT with <code>repo</code> scope and add it as repo secret <code>STATS_GH_TOKEN</code>.</p>

            <p class="meta">Source: <a href="https://github.com/${GITHUB_REPOSITORY}">github.com/${GITHUB_REPOSITORY}</a></p>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
